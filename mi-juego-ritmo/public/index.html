<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rhythm Legends - Multijugador</title>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { border: 2px solid #4a4a8a; border-radius: 10px; }
    #ui { position: absolute; top: 10px; left: 10px; color: white; display: flex; gap: 20px; }
    .player-score { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; }
    #life-bar { width: 200px; height: 15px; background: #333; border-radius: 8px; overflow: hidden; }
    #life-fill { width: 100%; height: 100%; background: #4caf50; transition: width 0.2s; }
    #combo { font-size: 48px; font-weight: bold; color: gold; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">
    <div class="player-score" id="my-score">Puntos: 0</div>
    <div>
      <div id="life-bar"><div id="life-fill"></div></div>
      <div id="combo">0</div>
    </div>
    <div id="other-scores"></div>
  </div>

  <script>
    // Conexión
    const WS_URL = `ws://${location.host}`; // automático con express
    let socket;
    let playerId;
    let songStartTime = 0;
    let noteMap = [];
    let audioCtx;
    let gameRunning = false;

    // Configuración de carriles
    const LANES = 4;
    const LANE_COLORS = ['#FF6B6B','#4ECDC4','#FFE66D','#FF9FF3'];
    const LANE_WIDTH = 80;
    const LANE_X = [200, 280, 360, 440]; // posiciones X en canvas 800x600
    const HIT_ZONE_Y = 500;
    const NOTE_SPEED = 0.3; // píxeles por ms (ajustar)

    // Elementos visuales
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;

    // Estado del jugador local
    let score = 0, combo = 0, life = 100;
    let notesToRender = [];
    let effects = [];

    // Iniciar conexión
    function connect() {
      socket = new WebSocket(WS_URL);
      socket.onopen = () => {
        socket.send(JSON.stringify({ type: 'join', room: 'sala1' }));
      };
      socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        switch (msg.type) {
          case 'joined':
            playerId = msg.playerId;
            document.getElementById('my-score').style.color = LANE_COLORS[0]; // decorativo
            break;
          case 'start':
            songStartTime = msg.startTime;
            noteMap = msg.noteMap;
            startGame();
            break;
          case 'hitResult':
            updateScores(msg);
            break;
          case 'playerList':
            updatePlayerList(msg.players);
            break;
        }
      };
      socket.onclose = () => setTimeout(connect, 3000);
    }

    function startGame() {
      gameRunning = true;
      startAudio();
      // Sincronizar inicio: esperar a que songStartTime sea futuro
      const now = Date.now();
      const delay = songStartTime - now;
      if (delay > 0) {
        setTimeout(() => {
          // empezar a generar notas visuales basadas en noteMap
          generateVisualNotes();
        }, delay);
      } else {
        generateVisualNotes();
      }
    }

    function generateVisualNotes() {
      noteMap.forEach(note => {
        notesToRender.push({
          ...note,
          x: LANE_X[note.lane],
          y: HIT_ZONE_Y - (note.time * NOTE_SPEED), // posición inicial arriba
          hit: false,
          startTime: songStartTime + note.time,
          visible: true,
          holding: false
        });
      });
    }

    // Audio sintetizado (ritmo base)
    function startAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Creamos un loop de batería simple
      const beatInterval = 500; // ms
      function playBeat() {
        if (!gameRunning) return;
        const now = audioCtx.currentTime;
        // Bombo
        const kick = audioCtx.createOscillator();
        const kickGain = audioCtx.createGain();
        kick.connect(kickGain);
        kickGain.connect(audioCtx.destination);
        kick.type = 'sine';
        kick.frequency.setValueAtTime(150, now);
        kick.frequency.exponentialRampToValueAtTime(30, now + 0.1);
        kickGain.gain.setValueAtTime(0.5, now);
        kickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        kick.start(now);
        kick.stop(now + 0.2);

        // Hi-hat cada 250ms
        const hihat = audioCtx.createOscillator();
        const hihatGain = audioCtx.createGain();
        hihat.connect(hihatGain);
        hihatGain.connect(audioCtx.destination);
        hihat.type = 'square';
        hihat.frequency.value = 3000;
        hihatGain.gain.setValueAtTime(0.1, now);
        hihatGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        hihat.start(now);
        hihat.stop(now + 0.05);
      }
      // Iniciar el loop al compás del beat
      const now = Date.now();
      const nextBeat = Math.ceil(now / beatInterval) * beatInterval;
      setTimeout(() => {
        playBeat();
        setInterval(playBeat, beatInterval);
      }, nextBeat - now);
    }

    // Manejar entradas de teclado
    const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
    window.addEventListener('keydown', (e) => {
      if (!gameRunning) return;
      const lane = keyMap[e.key];
      if (lane !== undefined) {
        const now = Date.now();
        const note = notesToRender.find(n => n.lane === lane && !n.hit && Math.abs(now - n.startTime) < 200);
        if (note) {
          note.hit = true;
          const diff = now - note.startTime;
          let judgement = '';
          if (Math.abs(diff) < 50) judgement = 'perfect';
          else if (Math.abs(diff) < 100) judgement = 'great';
          else judgement = 'good';
          socket.send(JSON.stringify({ type: 'hit', lane, type: note.type, judgement }));
          showHitEffect(lane, judgement);
        } else {
          // fallo
          socket.send(JSON.stringify({ type: 'hit', lane, type: 'miss' }));
          showHitEffect(lane, 'miss');
        }
        e.preventDefault();
      }
    });

    function showHitEffect(lane, judgement) {
      effects.push({ lane, judgement, time: Date.now() });
      if (judgement === 'perfect' || judgement === 'great') {
        combo++;
        if (judgement === 'perfect') score += 1000 + combo * 100;
        else score += 500 + combo * 50;
      } else if (judgement === 'good') {
        combo = 0;
        score += 200;
      } else {
        combo = 0;
        life = Math.max(0, life - 10);
      }
      updateLocalUI();
    }

    function updateLocalUI() {
      document.getElementById('my-score').textContent = `Puntos: ${score}`;
      document.getElementById('combo').textContent = combo;
      document.getElementById('life-fill').style.width = life + '%';
    }

    function updateScores(msg) {
      if (msg.playerId === playerId) {
        score = msg.score;
        combo = msg.combo;
        life = msg.life;
        updateLocalUI();
      } else {
        // actualizar puntuación de otros jugadores
        const otherDiv = document.getElementById('other-scores');
        let otherHTML = '';
        // (guardar datos de otros jugadores en un objeto)
        if (!window.otherPlayers) window.otherPlayers = {};
        window.otherPlayers[msg.playerId] = { score: msg.score, combo: msg.combo };
        for (const id in window.otherPlayers) {
          otherHTML += `<div class="player-score">${id}: ${window.otherPlayers[id].score}</div>`;
        }
        otherDiv.innerHTML = otherHTML;
      }
    }

    function updatePlayerList(players) {
      window.otherPlayers = {};
      players.forEach(p => {
        if (p.id !== playerId) window.otherPlayers[p.id] = { score: p.score, combo: p.combo };
      });
    }

    // Renderizado principal
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Fondo
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Líneas de carril
      for (let i = 0; i < LANES; i++) {
        ctx.strokeStyle = LANE_COLORS[i] + '55';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(LANE_X[i], 0);
        ctx.lineTo(LANE_X[i], canvas.height);
        ctx.stroke();
        // Zona de impacto
        ctx.fillStyle = LANE_COLORS[i] + 'AA';
        ctx.fillRect(LANE_X[i] - 20, HIT_ZONE_Y - 5, 40, 10);
      }

      // Notas
      const now = Date.now();
      notesToRender.forEach(note => {
        if (note.hit) return;
        const elapsed = now - songStartTime;
        const noteTime = note.time;
        const y = HIT_ZONE_Y - (noteTime - elapsed) * NOTE_SPEED;
        if (y < -50 || y > canvas.height + 50) return;
        ctx.fillStyle = LANE_COLORS[note.lane];
        if (note.type === 'tap') {
          ctx.fillRect(note.x - 15, y - 5, 30, 10);
        } else if (note.type === 'hold') {
          const holdDuration = note.duration;
          const endY = HIT_ZONE_Y - (noteTime + holdDuration - elapsed) * NOTE_SPEED;
          ctx.fillRect(note.x - 15, y - 5, 30, endY - y + 10);
        } else if (note.type === 'flick') {
          ctx.beginPath();
          ctx.moveTo(note.x - 15, y - 5);
          ctx.lineTo(note.x + 5, y - 15);
          ctx.lineTo(note.x + 15, y - 5);
          ctx.closePath();
          ctx.fill();
        }
      });

      // Efectos
      effects = effects.filter(e => Date.now() - e.time < 300);
      effects.forEach(e => {
        ctx.font = '24px Arial';
        ctx.fillStyle = e.judgement === 'perfect' ? 'gold' : e.judgement === 'great' ? 'lime' : e.judgement === 'good' ? 'orange' : 'red';
        ctx.fillText(e.judgement.toUpperCase(), LANE_X[e.lane] - 20, HIT_ZONE_Y - 30);
      });

      // Combo grande
      ctx.font = 'bold 48px Arial';
      ctx.fillStyle = 'white';
      ctx.shadowColor = 'black';
      ctx.shadowBlur = 10;
      ctx.fillText(combo > 0 ? combo + ' COMBO' : '', 300, 100);
      ctx.shadowBlur = 0;

      requestAnimationFrame(draw);
    }

    connect();
    draw();
  </script>
</body>
</html>
